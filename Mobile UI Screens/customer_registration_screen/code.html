<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Customer Registration - Kuteera Kitchen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8d4a25",
                        "accent": "#1b4332",
                        "background-light": "#fdfaf1",
                        "background-dark": "#1f1713",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #fdfaf1;
        }
        .form-input:focus {
            border-color: #8d4a25 !important;
            ring-color: #8d4a25 !important;
        }
        /* iOS style notch area padding */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container (Phone Form Factor) -->
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden safe-top">
<!-- Top Bar / Navigation -->
<div class="flex items-center p-4 justify-between">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight flex-1 text-center pr-10">Create Your Account</h2>
</div>
<!-- Hero / Brand Section -->
<div class="px-6 pt-8 pb-4">
<h1 class="text-primary text-[32px] font-bold leading-tight tracking-tight">Join Kuteera Kitchen</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal mt-2">Sign up to start your healthy food subscription journey.</p>
</div>
<!-- Registration Form -->
<div class="flex-1 px-6 py-4 space-y-6 max-w-md mx-auto w-full">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold ml-1">Full Name</label>
<div class="relative flex items-center">
<input class="form-input w-full h-14 rounded-lg border border-primary bg-transparent px-4 text-base focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="John Doe" type="text"/>
<div class="absolute right-4 text-accent">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</div>
<!-- Email Address Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold ml-1">Email Address</label>
<div class="relative flex items-center">
<input class="form-input w-full h-14 rounded-lg border border-primary bg-transparent px-4 text-base focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="example@mail.com" type="email"/>
<div class="absolute right-4 text-accent">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</div>
<!-- Phone Number Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-800 dark:text-slate-200 text-sm font-semibold ml-1">Phone Number</label>
<div class="relative flex items-center">
<input class="form-input w-full h-14 rounded-lg border border-primary bg-transparent px-4 text-base focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="(555) 000-0000" type="tel"/>
<!-- Checkmark hidden for incomplete field example -->
</div>
</div>
<!-- Agreement Text -->
<p class="text-[13px] text-slate-500 text-center px-4 leading-relaxed">
                By creating an account, you agree to our <span class="text-primary font-medium underline cursor-pointer">Terms of Service</span> and <span class="text-primary font-medium underline cursor-pointer">Privacy Policy</span>.
            </p>
<!-- Primary Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                    Create Account
                </button>
</div>
</div>
<!-- Footer / Login Link -->
<div class="p-8 mt-auto flex justify-center items-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Login</a>
</p>
</div>
<!-- Visual Accent (Optional bottom decoration) -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/10 to-transparent"></div>
</div>
</body></html>
