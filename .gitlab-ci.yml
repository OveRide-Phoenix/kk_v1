# ─── CI/CD Pipeline ────────────────────────────────────────────────────────────
# Runs entirely on the self-hosted VPS shell runner (no Docker, no shared minutes).
# Stages run in order; jobs within a stage run in parallel.
#
# Pipeline triggers:
#   - MR open/update  → lint only (no deploy)
#   - Push to develop → lint + deploy to dev (auto)
#   - Push to main    → lint + deploy to prod (manual)
#   - Feature branch push with no MR → no pipeline

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - lint
  - deploy

# ─── Cache ─────────────────────────────────────────────────────────────────────

.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# ─── Lint ──────────────────────────────────────────────────────────────────────

js_lint:
  stage: lint
  <<: *npm_cache
  before_script:
    - npm ci --prefer-offline
  script:
    - npm run lint
    - npx tsc --noEmit
  allow_failure: false

black:
  stage: lint
  script:
    - black --check --line-length 100 backend/
  allow_failure: false

# ─── Deploy ────────────────────────────────────────────────────────────────────
# Runs directly on the VPS — no SSH needed, runner is already on the machine.
# Required CI/CD variables: DEV_FRONTEND_ENV, DEV_BACKEND_ENV,
#                           PROD_FRONTEND_ENV, PROD_BACKEND_ENV

deploy_dev:
  stage: deploy
  script:
    - printf '%s' "$DEV_FRONTEND_ENV" > /var/www/kk_v1_dev/.env
    - printf '%s' "$DEV_BACKEND_ENV" > /var/www/kk_v1_dev/backend/.env
    - cd /var/www/kk_v1_dev
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/kuteera-kitchen/kk_v1.git"
    - git fetch origin
    - git checkout -f develop
    - git reset --hard origin/develop
    - git remote set-url origin "git@gitlab.com:kuteera-kitchen/kk_v1.git"
    - npm ci --prefer-offline
    - npm run build
    - backend/venv/bin/pip install -q -r requirements.txt
    - sudo systemctl restart kk-backend-dev
    - sudo systemctl restart kk-frontend-dev
    - sudo systemctl reload nginx
    - sleep 15
    - curl --fail -s "https://$DEV_DOMAIN/api/backend/health"
    - curl --fail -s "https://$DEV_DOMAIN"
  environment:
    name: dev
    url: https://$DEV_DOMAIN
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy_prod:
  stage: deploy
  script:
    - printf '%s' "$PROD_FRONTEND_ENV" > /var/www/kk_v1_prod/.env
    - printf '%s' "$PROD_BACKEND_ENV" > /var/www/kk_v1_prod/backend/.env
    - cd /var/www/kk_v1_prod
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/kuteera-kitchen/kk_v1.git"
    - git fetch origin
    - git checkout -f main
    - git reset --hard origin/main
    - git remote set-url origin "git@gitlab.com:kuteera-kitchen/kk_v1.git"
    - npm ci --prefer-offline
    - npm run build
    - backend/venv/bin/pip install -q -r requirements.txt
    - sudo systemctl restart kk-backend-prod
    - sudo systemctl restart kk-frontend-prod
    - sudo systemctl reload nginx
    - sleep 15
    - curl --fail -s "https://$PROD_DOMAIN/api/backend/health"
    - curl --fail -s "https://$PROD_DOMAIN"
  environment:
    name: prod
    url: https://$PROD_DOMAIN
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
