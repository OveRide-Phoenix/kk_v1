# ─── CI/CD Pipeline ────────────────────────────────────────────────────────────
# Stages run in order; jobs within a stage run in parallel.
# Deployment is handled separately — this pipeline covers quality, security, and build.

stages:
  - lint
  - build
  - test
  - security
  - sonarqube

variables:
  GENERATED_EXCLUDED_PATHS: ".next, .next/**, out, out/**, build, build/**, coverage, coverage/**, node_modules, node_modules/**"
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, .next, .next/**, out, out/**, build, build/**, coverage, coverage/**, node_modules, node_modules/**"
  SECRET_DETECTION_EXCLUDED_PATHS: ".next, .next/**, out, out/**, build, build/**, coverage, coverage/**, node_modules, node_modules/**"
  DS_EXCLUDED_PATHS: "spec, test, tests, tmp, .next, .next/**, out, out/**, build, build/**, coverage, coverage/**, node_modules, node_modules/**"

# ─── Cache ─────────────────────────────────────────────────────────────────────

.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

.pip_cache: &pip_cache
  cache:
    key:
      files:
        - backend/requirements.txt
    paths:
      - backend/.pip_cache/
    policy: pull-push

# ─── Lint ──────────────────────────────────────────────────────────────────────

eslint:
  stage: lint
  image: node:20-alpine
  <<: *npm_cache
  before_script:
    - npm ci --prefer-offline
  script:
    - npm run lint
  allow_failure: false

typescript:
  stage: lint
  image: node:20-alpine
  <<: *npm_cache
  before_script:
    - npm ci --prefer-offline
  script:
    - npx tsc --noEmit
  allow_failure: false

black:
  stage: lint
  image: python:3.12-slim
  <<: *pip_cache
  before_script:
    - pip install --cache-dir backend/.pip_cache black==24.10.0
  script:
    - black --check --line-length 100 backend/
  allow_failure: false

# ─── Build ─────────────────────────────────────────────────────────────────────

nextjs_build:
  stage: build
  image: node:20-alpine
  <<: *npm_cache
  before_script:
    - npm ci --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  allow_failure: false

