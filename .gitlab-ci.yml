# ─── Security ──────────────────────────────────────────────────────────────────

sast:
  stage: security

secret_detection:
  stage: security

dependency_scanning:
  stage: security

code_quality:
  stage: security
  image: registry.gitlab.com/gitlab-org/ci-cd/codequality:latest
  script:
    - /codequality
  allow_failure: false
  artifacts:
    reports:
      codequality: gl-code-quality-report.json

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

# ─── SonarQube ─────────────────────────────────────────────────────────────────

sonarqube:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli
  script:
    - |
      if [ -z "$CI_MERGE_REQUEST_ID" ]; then
        echo "Not a merge request pipeline — skipping SonarQube."
        exit 0
      fi
    - sonar-scanner -Dsonar.token="$SONAR_TOKEN"
  # sonar.qualitygate.wait=true in sonar-project.properties already gates on quality
  allow_failure: false
