# ─── Kuteera Kitchen Nginx Config ────────────────────────────────────────────
# Place this file at /etc/nginx/sites-available/kk and symlink:
#   sudo ln -s /etc/nginx/sites-available/kk /etc/nginx/sites-enabled/kk
#
# Domains: kuteerakitchen.com (PROD) and dev.kuteerakitchen.com (DEV)
# Run certbot after enabling: sudo certbot --nginx -d kuteerakitchen.com -d www.kuteerakitchen.com -d dev.kuteerakitchen.com
# ─────────────────────────────────────────────────────────────────────────────

# ── DEV ──────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name dev.kuteerakitchen.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.kuteerakitchen.com;

    ssl_certificate     /etc/letsencrypt/live/kuteerakitchen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuteerakitchen.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket terminal — bypass Next.js, proxy direct to FastAPI
    # Next.js cannot proxy WebSocket upgrades, so nginx handles this path directly.
    location /api/backend/api/dev/vps/terminal {
        proxy_pass         http://127.0.0.1:8001/api/dev/vps/terminal;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # WebSocket metrics stream
    location /api/backend/api/dev/vps/metrics/stream {
        proxy_pass         http://127.0.0.1:8001/api/dev/vps/metrics/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy to DEV Next.js (port 3001)
    # Next.js handles /api/backend/* rewrites internally to port 8001
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets — let Next.js serve them but cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/kk-dev-access.log;
    error_log  /var/log/nginx/kk-dev-error.log;
}

# ── PROD ─────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name kuteerakitchen.com www.kuteerakitchen.com;
    return 301 https://kuteerakitchen.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.kuteerakitchen.com;
    return 301 https://kuteerakitchen.com$request_uri;
}

server {
    listen 443 ssl;
    server_name kuteerakitchen.com;

    ssl_certificate     /etc/letsencrypt/live/kuteerakitchen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuteerakitchen.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # WebSocket terminal — bypass Next.js, proxy direct to FastAPI
    location /api/backend/api/dev/vps/terminal {
        proxy_pass         http://127.0.0.1:8000/api/dev/vps/terminal;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # WebSocket metrics stream
    location /api/backend/api/dev/vps/metrics/stream {
        proxy_pass         http://127.0.0.1:8000/api/dev/vps/metrics/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy to PROD Next.js (port 3000)
    # Next.js handles /api/backend/* rewrites internally to port 8000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/kk-prod-access.log;
    error_log  /var/log/nginx/kk-prod-error.log;
}

