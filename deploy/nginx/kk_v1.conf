# Kuteera Kitchen — NGINX reverse proxy config
# Place at: /etc/nginx/sites-available/kk_v1
# Enable with: sudo ln -s /etc/nginx/sites-available/kk_v1 /etc/nginx/sites-enabled/
# Test with:   sudo nginx -t
# Reload with: sudo systemctl reload nginx
#
# Prerequisites:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#   (certbot will auto-populate the ssl_certificate lines below)

# ---------------------------------------------------------------------------
# HTTP — redirect everything to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt HTTP-01 challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main site
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # --- SSL (populated/managed by certbot) --------------------------------
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # --- Gzip ---------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Upload size (adjust to match FastAPI / Next.js limits) -------------
    client_max_body_size 20M;

    # --- Timeouts (generous for meal-order flows) ---------------------------
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # --- Common proxy headers (defined once, reused below) -----------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # -----------------------------------------------------------------------
    # FastAPI backend
    # Strips the /api/backend prefix before forwarding, so
    # /api/backend/orders  →  http://127.0.0.1:8000/orders
    # -----------------------------------------------------------------------
    location /api/backend/ {
        proxy_pass http://127.0.0.1:8000/;

        # Don't cache API responses by default; individual endpoints can opt in
        add_header Cache-Control "no-store" always;
    }

    # -----------------------------------------------------------------------
    # Next.js static assets — long-lived cache (filenames are content-hashed)
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # -----------------------------------------------------------------------
    # Next.js public/ directory assets
    # -----------------------------------------------------------------------
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # -----------------------------------------------------------------------
    # Next.js frontend (catch-all)
    # WebSocket upgrade headers are required for Next.js HMR (dev) and any
    # future real-time features.
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
